<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivy Liu · about</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.8;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #0000ee;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            background: #ffff00;
            text-decoration: underline;
        }

        .page-title {
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
        }

        /* ── Content: smaller font ── */
        .content {
            font-size: 14px;
            line-height: 1.9;
        }

        .content p {
            margin-bottom: 14px;
        }

        /* ── Photo: smaller ── */
        .photo {
            margin: 12px auto 18px;
            display: block;
            max-width: 35%;
        }

        .photo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .quote {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #eee;
            font-style: italic;
            color: #555;
            font-size: 13px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            font-size: 12px;
            color: #bbb;
            text-align: center;
            border-top: 1px solid #eee;
        }

        /* ── Typewriter cursor blink ── */
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: #000;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
                font-size: 14px;
            }
            .photo {
                max-width: 55%;
            }
            .page-title {
                font-size: 20px;
            }
            .content {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <a class="back-link" href="index.html">← ..</a>

    <div class="page-title">about_me</div>

    <div class="photo">
        <img src="https://i.imgur.com/jcz5GNA.jpeg" alt="Portrait of Ivy Liu" />
    </div>

    <!-- ── TYPEWRITER CONTENT ── -->
    <div class="content" id="typewriter-content">
        <p id="line1"></p>
        <p id="line2"></p>
        <p id="line3"></p>
        <p id="line4"></p>
        <div class="quote" id="line5"></div>
    </div>

    <div class="footer">
        thanks for visiting. ✦
    </div>

</div>

<script>
    (function() {

        // ── The text to type out ──
        var lines = [
            "Hello. I am a Biomedical Engineering student at City University of Hong Kong.",
            "Beyond my academic work, I have equal fascination towards photography, nature, art, philosophy, music, and dance. ",
            "My professional life includes consultancy, mentoring, and IT projects. Ocassionally, i practice altruism through few communities.",
            "I was born and bred in Hong Kong, and the city's mix of mountains, sea, and neon has shaped both my curiosity and my work.",
            'Recent favourite quote: "Most people are other people. Their thoughts are someone else\'s opinions, their lives a mimicry, their passions a quotation."'
        ];

        var lineElements = [
            document.getElementById('line1'),
            document.getElementById('line2'),
            document.getElementById('line3'),
            document.getElementById('line4'),
            document.getElementById('line5')
        ];

        var charIndex = 0;
        var lineIndex = 0;
        var isTyping = false;
        var typingSpeed = 12; // milliseconds per character (fast!)

        // ── Type one character at a time ──
        function typeNextChar() {
            if (lineIndex >= lines.length) {
                // All lines done — remove cursor
                var cursor = document.querySelector('.cursor-blink');
                if (cursor) cursor.remove();
                return;
            }

            var currentLine = lines[lineIndex];
            var currentElement = lineElements[lineIndex];

            if (charIndex < currentLine.length) {
                // Add next character
                currentElement.textContent += currentLine.charAt(charIndex);
                charIndex++;
                setTimeout(typeNextChar, typingSpeed);
            } else {
                // Line complete — add cursor blink then move to next line
                charIndex = 0;
                lineIndex++;
                // Add blinking cursor at the end of the line
                if (lineIndex < lines.length) {
                    var cursor = document.createElement('span');
                    cursor.className = 'cursor-blink';
                    currentElement.appendChild(cursor);
                    // Remove cursor after a moment
                    setTimeout(function() {
                        if (cursor.parentNode) {
                            cursor.remove();
                        }
                    }, 400);
                }
                // Small pause between lines
                setTimeout(typeNextChar, 150);
            }
        }

        // ── Start typing after a short delay ──
        setTimeout(typeNextChar, 400);

        // ── Ensure cursor is removed if user navigates away ──
        window.addEventListener('beforeunload', function() {
            var cursors = document.querySelectorAll('.cursor-blink');
            cursors.forEach(function(c) { c.remove(); });
        });

    })();
</script>

</body>
</html>
