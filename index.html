<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivy Liu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .title {
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #333;
            font-size: 16px;
            margin-bottom: 24px;
            border-bottom: 2px solid #000;
            padding-bottom: 12px;
        }

        .tree {
            white-space: pre;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.8;
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .tree .folder {
            color: #0000ee;
            text-decoration: none;
            font-weight: 500;
        }

        .tree .folder:hover {
            background: #ffff00;
            text-decoration: underline;
            text-decoration-color: #0000ee;
            text-underline-offset: 2px;
        }

        .tree a {
            color: #008000;
            text-decoration: none;
        }

        .tree a:hover {
            background: #ffff00;
            text-decoration: underline;
            text-decoration-color: #008000;
            text-underline-offset: 2px;
        }

        .tree .highlight {
            background: #ffffcc;
            padding: 0 2px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            font-size: 12px;
            color: #bbb;
            text-align: center;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
                font-size: 14px;
            }
            .tree {
                font-size: 14px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .title {
                font-size: 22px;
            }
        }

        @media (max-width: 390px) {
            body {
                padding: 10px;
                font-size: 13px;
            }
            .tree {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="title">Ivy Liu</div>

    <!-- TREE VIEW -->
    <div class="tree">
        <span class="highlight">~/portfolio</span>
        ├── <a class="folder" href="about.html">about_me</a>
        │   └── <a href="about.html">intro.txt</a>
        ├── <a class="folder" href="photos.html">photos</a>
        │   └── <a href="photos.html">gallery.txt</a>
        ├── <a class="folder" href="monthly_suggestions.html">monthly_suggestions</a>
        │   └── <a href="monthly_suggestions.html">book.txt</a>
        └── <a class="folder" href="contact.html">contact</a>
            └── <a href="contact.html">contact.txt</a>
    </div>
    <!-- FOOTER -->
    <div class="footer">
        thanks for visiting. ✦
    </div>

</div>

</body>
</html>
